name: hue
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  hooks_riverpod: ^3.1.0
  flutter_hooks: ^0.21.3+1

  # Navigation
  go_router: ^17.1.0

  # Backend
  supabase_flutter: ^2.0.2

  # Localization
  slang: ^4.0.0
  slang_flutter: ^4.0.0

  # UI/Icons
  lucide_icons: any

  google_fonts: ^8.0.1

  # Utils
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  loading_animation_widget: ^1.3.0
  riverpod_annotation: ^4.0.0
  flutter_animate: ^4.5.2
  timeago: ^3.7.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^4.0.0+1
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  slang_build_runner: ^4.12.1

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
